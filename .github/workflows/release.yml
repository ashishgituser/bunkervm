name: Build & Release BunkerVM Bundle

# Builds the pre-built BunkerVM bundle (our micro-OS + Firecracker + kernel)
# so users just `pip install` and everything downloads automatically.
#
# Trigger: push a tag like v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  FC_VERSION: "v1.11.0"
  ALPINE_VERSION: "3.21"

jobs:
  build-bundle:
    name: Build BunkerVM Bundle (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs wget curl

      - name: Download Firecracker
        run: |
          mkdir -p /tmp/fc-extract
          curl -sL -o /tmp/fc.tgz "https://github.com/firecracker-microvm/firecracker/releases/download/${{ env.FC_VERSION }}/firecracker-${{ env.FC_VERSION }}-x86_64.tgz"
          tar xzf /tmp/fc.tgz -C /tmp/fc-extract
          # Tarball contains: release-VERSION-ARCH/firecracker-VERSION-ARCH
          FC_BIN=$(find /tmp/fc-extract -name "firecracker-*" -type f | head -1)
          echo "Found firecracker binary: $FC_BIN"
          cp "$FC_BIN" /tmp/firecracker
          chmod +x /tmp/firecracker
          file /tmp/firecracker
          ls -lh /tmp/firecracker

      - name: Download kernel
        run: |
          # Firecracker CI kernels — dynamically find the latest available
          ARCH="x86_64"
          FC_MINOR="${FC_VERSION%.*}"  # v1.11.0 -> v1.11
          
          # Try the CI bucket first (exclude .config files)
          KERNEL_KEY=$(curl -s "http://spec.ccfc.min.s3.amazonaws.com/?prefix=firecracker-ci/${FC_MINOR}/${ARCH}/vmlinux-&list-type=2" \
            | grep -oP '(?<=<Key>)(firecracker-ci/[^<]+vmlinux-[0-9][^<]*)' \
            | grep -v '\.config$' \
            | sort -V | tail -1)
          
          if [ -n "$KERNEL_KEY" ]; then
            echo "Found kernel: $KERNEL_KEY"
            curl -sL -o /tmp/vmlinux "https://s3.amazonaws.com/spec.ccfc.min/${KERNEL_KEY}"
          else
            # Fallback: build a minimal kernel or use a known good URL
            echo "CI bucket empty, trying quickstart path..."
            curl -sL -o /tmp/vmlinux "https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/${ARCH}/kernels/vmlinux-5.10.225"
          fi
          
          # Validate it's actually an ELF binary, not an XML error
          if ! file /tmp/vmlinux | grep -q "ELF"; then
            echo "ERROR: Downloaded kernel is not a valid ELF binary!"
            file /tmp/vmlinux
            head -c 200 /tmp/vmlinux
            exit 1
          fi
          
          ls -lh /tmp/vmlinux
          file /tmp/vmlinux

      - name: Build BunkerVM rootfs
        run: |
          # Build our micro-OS (Alpine + Python + exec_agent)
          sudo bash build/build-sandbox-rootfs.sh
          ls -lh build/rootfs.ext4

      - name: Package bundle
        run: |
          mkdir -p /tmp/bunkervm-bundle
          cp /tmp/firecracker /tmp/bunkervm-bundle/
          cp /tmp/vmlinux /tmp/bunkervm-bundle/
          cp build/rootfs.ext4 /tmp/bunkervm-bundle/

          # Add version metadata
          echo "{\"version\": \"$VERSION\", \"arch\": \"x86_64\"}" > /tmp/bunkervm-bundle/bundle.json

          cd /tmp
          tar czf bunkervm-bundle-x86_64.tar.gz -C bunkervm-bundle .
          ls -lh bunkervm-bundle-x86_64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "BunkerVM ${{ env.VERSION }}"
          body: |
            ## BunkerVM ${{ env.VERSION }}

            Hardware-isolated sandbox for AI agents.

            ### Install
            ```
            pip install bunkervm
            ```
            The bundle downloads automatically on first run.

            ### Manual download
            If auto-download fails, download `bunkervm-bundle-x86_64.tar.gz` and extract to `~/.bunkervm/bundle/`.
          files: |
            /tmp/bunkervm-bundle-x86_64.tar.gz
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-bundle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
