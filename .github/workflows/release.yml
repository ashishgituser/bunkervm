name: Build & Release NervOS Bundle

# Builds the pre-built NervOS bundle (our micro-OS + Firecracker + kernel)
# so users just `pip install` and everything downloads automatically.
#
# Trigger: push a tag like v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  FC_VERSION: "v1.11.0"
  KERNEL_URL: "https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/x86_64/kernels/vmlinux-6.1.102"
  ALPINE_VERSION: "3.21"

jobs:
  build-bundle:
    name: Build NervOS Bundle (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs wget curl

      - name: Download Firecracker
        run: |
          cd /tmp
          curl -sL -o fc.tgz "https://github.com/firecracker-microvm/firecracker/releases/download/${{ env.FC_VERSION }}/firecracker-${{ env.FC_VERSION }}-x86_64.tgz"
          tar xzf fc.tgz
          FC_BIN=$(find /tmp -name "firecracker-*" -type f -not -name "*.tgz" | head -1)
          cp "$FC_BIN" /tmp/firecracker
          chmod +x /tmp/firecracker
          /tmp/firecracker --version

      - name: Download kernel
        run: |
          curl -sL -o /tmp/vmlinux "${{ env.KERNEL_URL }}"
          ls -lh /tmp/vmlinux

      - name: Build NervOS rootfs
        run: |
          # Build our micro-OS (Alpine + Python + exec_agent)
          sudo bash build/build-sandbox-rootfs.sh
          ls -lh build/rootfs.ext4

      - name: Package bundle
        run: |
          mkdir -p /tmp/nervos-bundle
          cp /tmp/firecracker /tmp/nervos-bundle/
          cp /tmp/vmlinux /tmp/nervos-bundle/
          cp build/rootfs.ext4 /tmp/nervos-bundle/

          # Add version metadata
          echo "{\"version\": \"$VERSION\", \"arch\": \"x86_64\"}" > /tmp/nervos-bundle/bundle.json

          cd /tmp
          tar czf nervos-bundle-x86_64.tar.gz -C nervos-bundle .
          ls -lh nervos-bundle-x86_64.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "NervOS ${{ env.VERSION }}"
          body: |
            ## NervOS ${{ env.VERSION }}

            Hardware-isolated sandbox for AI agents.

            ### Install
            ```
            pip install nervos-sandbox
            ```
            The bundle downloads automatically on first run.

            ### Manual download
            If auto-download fails, download `nervos-bundle-x86_64.tar.gz` and extract to `~/.nervos/bundle/`.
          files: |
            /tmp/nervos-bundle-x86_64.tar.gz
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-bundle

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
