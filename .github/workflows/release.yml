name: Build & Release BunkerVM

# Builds:
#   1. Linux bundle (Firecracker + kernel + rootfs)  — for `pip install bunkervm`
#   2. Windows installer (BunkerDesktop.exe)          — for desktop users
#   3. PyPI package
#
# Trigger: push a tag like v0.8.3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.8.3)'
        required: true

permissions:
  contents: write

env:
  FC_VERSION: "v1.11.0"
  ALPINE_VERSION: "3.21"

jobs:
  # ─────────────────────────────────────────────────────────
  #  Job 1: Build the Linux bundle (Firecracker + rootfs)
  # ─────────────────────────────────────────────────────────
  build-bundle:
    name: Build Linux Bundle (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs wget curl

      - name: Download Firecracker
        run: |
          mkdir -p /tmp/fc-extract
          curl -sL -o /tmp/fc.tgz "https://github.com/firecracker-microvm/firecracker/releases/download/${{ env.FC_VERSION }}/firecracker-${{ env.FC_VERSION }}-x86_64.tgz"
          tar xzf /tmp/fc.tgz -C /tmp/fc-extract
          FC_BIN=$(find /tmp/fc-extract -name "firecracker-v*" -type f \
            ! -name "*.debug" ! -name "*.json" ! -name "*.yaml" | head -1)
          echo "Found firecracker binary: $FC_BIN"
          cp "$FC_BIN" /tmp/firecracker
          chmod +x /tmp/firecracker
          file /tmp/firecracker
          ls -lh /tmp/firecracker
          /tmp/firecracker --version || { echo "ERROR: Firecracker binary does not run!"; exit 1; }

      - name: Download kernel
        run: |
          ARCH="x86_64"
          FC_MINOR="${FC_VERSION%.*}"
          KERNEL_KEY=$(curl -s "http://spec.ccfc.min.s3.amazonaws.com/?prefix=firecracker-ci/${FC_MINOR}/${ARCH}/vmlinux-&list-type=2" \
            | grep -oP '(?<=<Key>)(firecracker-ci/[^<]+vmlinux-[0-9][^<]*)' \
            | grep -v '\.config$' \
            | sort -V | tail -1)
          if [ -n "$KERNEL_KEY" ]; then
            echo "Found kernel: $KERNEL_KEY"
            curl -sL -o /tmp/vmlinux "https://s3.amazonaws.com/spec.ccfc.min/${KERNEL_KEY}"
          else
            echo "CI bucket empty, trying quickstart path..."
            curl -sL -o /tmp/vmlinux "https://s3.amazonaws.com/spec.ccfc.min/img/quickstart_guide/${ARCH}/kernels/vmlinux-5.10.225"
          fi
          if ! file /tmp/vmlinux | grep -q "ELF"; then
            echo "ERROR: Downloaded kernel is not a valid ELF binary!"
            file /tmp/vmlinux
            head -c 200 /tmp/vmlinux
            exit 1
          fi
          ls -lh /tmp/vmlinux

      - name: Build BunkerVM rootfs
        run: |
          sudo bash build/build-sandbox-rootfs.sh
          ls -lh build/rootfs.ext4

      - name: Package bundle
        run: |
          mkdir -p /tmp/bunkervm-bundle
          cp /tmp/firecracker /tmp/bunkervm-bundle/
          cp /tmp/vmlinux /tmp/bunkervm-bundle/
          cp build/rootfs.ext4 /tmp/bunkervm-bundle/
          echo "{\"version\": \"$VERSION\", \"arch\": \"x86_64\"}" > /tmp/bunkervm-bundle/bundle.json
          cd /tmp
          tar czf bunkervm-bundle-x86_64.tar.gz -C bunkervm-bundle .
          ls -lh bunkervm-bundle-x86_64.tar.gz

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: /tmp/bunkervm-bundle-x86_64.tar.gz

  # ─────────────────────────────────────────────────────────
  #  Job 2: Build BunkerDesktop Windows Installer
  # ─────────────────────────────────────────────────────────
  build-desktop:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pywebview pythonnet clr-loader

      - name: Build BunkerDesktop.exe (PyInstaller)
        run: |
          cd desktop
          pyinstaller BunkerDesktop.spec --noconfirm
          # Verify the exe was created
          if (!(Test-Path "dist\BunkerDesktop.exe")) {
            Write-Error "BunkerDesktop.exe was not created!"
            exit 1
          }
          $size = [math]::Round((Get-Item "dist\BunkerDesktop.exe").Length / 1MB, 2)
          Write-Host "BunkerDesktop.exe built: $size MB"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
          # Add to PATH for this step
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Build installer (Inno Setup)
        run: |
          # Pass version to Inno Setup via /D define
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ env.VERSION }}" `
            installer\windows\BunkerDesktopSetup.iss
          # Verify
          $installer = Get-ChildItem "installer\windows\Output\BunkerDesktopSetup-*.exe" | Select-Object -First 1
          if (!$installer) {
            Write-Error "Installer was not created!"
            exit 1
          }
          $size = [math]::Round($installer.Length / 1MB, 2)
          Write-Host "Installer built: $($installer.Name) ($size MB)"

      # ── Code Signing ──
      # Signs both BunkerDesktop.exe and the installer to prevent SmartScreen blocking.
      # Uses SSL.com eSigner — cloud-based, no hardware token needed.
      #
      # Setup (one-time, ~10 min):
      #   1. Buy OV Code Signing cert at https://ssl.com (~$75/yr)
      #      - Or apply for free OSS cert at https://signpath.io/open-source
      #   2. Enable eSigner for the cert in your SSL.com dashboard
      #   3. Add these GitHub repo secrets (Settings → Secrets → Actions):
      #      - ES_USERNAME     (SSL.com account email)
      #      - ES_PASSWORD     (SSL.com account password)
      #      - ES_CREDENTIAL_ID (from eSigner dashboard)
      #      - ES_TOTP_SECRET  (eSigner TOTP secret for automated signing)
      #
      # This step is skipped gracefully if secrets are not configured.
      - name: Sign executables (SSL.com eSigner)
        if: env.ES_USERNAME != ''
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: installer/windows/Output/BunkerDesktopSetup-${{ env.VERSION }}.exe
          malware_block: false
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}

      - name: Sign BunkerDesktop.exe
        if: env.ES_USERNAME != ''
        uses: sslcom/esigner-codesign@develop
        with:
          command: sign
          username: ${{ secrets.ES_USERNAME }}
          password: ${{ secrets.ES_PASSWORD }}
          credential_id: ${{ secrets.ES_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.ES_TOTP_SECRET }}
          file_path: desktop/dist/BunkerDesktop.exe
          malware_block: false
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/Output/BunkerDesktopSetup-*.exe

  # ─────────────────────────────────────────────────────────
  #  Job 3: Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-bundle, build-desktop]

    steps:
      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "BunkerVM ${{ env.VERSION }}"
          body: |
            ## BunkerVM ${{ env.VERSION }}

            Hardware-isolated sandbox for AI agents, powered by Firecracker microVMs.

            ---

            ### Windows Desktop App (recommended for most users)

            Download **BunkerDesktopSetup-${{ env.VERSION }}.exe** and run it.
            The installer sets up WSL2, installs the backend, and creates a desktop shortcut.
            Just double-click — everything is automatic.

            > **Note:** Windows may show a SmartScreen warning for unsigned builds.
            > Click **"More info" → "Run anyway"** to proceed. The app is safe.

            ### Python library (for developers / CI)
            ```
            pip install bunkervm
            ```
            The Firecracker bundle downloads automatically on first run.
            For manual setup, download `bunkervm-bundle-x86_64.tar.gz` and extract to `~/.bunkervm/bundle/`.

          files: |
            release-assets/linux-bundle/*
            release-assets/windows-installer/*
          draft: false
          prerelease: ${{ contains(env.VERSION, 'alpha') || contains(env.VERSION, 'beta') || contains(env.VERSION, 'rc') }}

  # ─────────────────────────────────────────────────────────
  #  Job 4: Publish Python package to PyPI
  # ─────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
